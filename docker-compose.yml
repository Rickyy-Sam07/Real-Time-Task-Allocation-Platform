services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: task_alloc
      POSTGRES_USER: task_user
      POSTGRES_PASSWORD: task_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api_gateway:
    build:
      context: .
      dockerfile: services/api_gateway/Dockerfile
    depends_on:
      - kafka
      - postgres
      - redis
    ports:
      - "8000:8000"
    env_file:
      - .env.example

  scheduler:
    build:
      context: .
      dockerfile: services/scheduler/Dockerfile
    depends_on:
      - kafka
      - postgres
      - redis
    env_file:
      - .env.example

  dlq_processor:
    build:
      context: .
      dockerfile: services/dlq_processor/Dockerfile
    depends_on:
      - kafka
      - postgres
    env_file:
      - .env.example

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    depends_on:
      - kafka
      - redis
    env_file:
      - .env.example
    environment:
      WORKER_EXECUTION_MODE: ${WORKER_EXECUTION_MODE:-normal}
      WORKER_ZONE: ${WORKER_ZONE:-zone-a}
      WORKER_SKILLS: ${WORKER_SKILLS:-rescue,medical}
      WORKER_MIN_EXEC_SEC: ${WORKER_MIN_EXEC_SEC:-1.0}
      WORKER_MAX_EXEC_SEC: ${WORKER_MAX_EXEC_SEC:-3.0}
      WORKER_FAILURE_RATE: ${WORKER_FAILURE_RATE:-0.1}
      WORKER_DETERMINISTIC_DELAY_SEC: ${WORKER_DETERMINISTIC_DELAY_SEC:-1.5}
      WORKER_DETERMINISTIC_FAIL_PERCENT: ${WORKER_DETERMINISTIC_FAIL_PERCENT:-10}
    deploy:
      replicas: 2

volumes:
  postgres_data:
